[pytest]
; ── Discovery ──────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; ── Output ─────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

; ── Markers ─────────────────────────────────────────────────────────────────
markers =
    pass_test: tests expected to pass
    fail_test: tests expected to fail (intentional breakage)
